---
# ─────────────────────────────────────────────────────────────────────────────
# 1. Check if WireGuard is already installed
# ─────────────────────────────────────────────────────────────────────────────
- name: Check if WireGuard executable exists
  ansible.windows.win_stat:
    path: "{{ wireguard_exe }}"
  register: wg_exe_stat

# ─────────────────────────────────────────────────────────────────────────────
# 2. Download installer (only when WireGuard is not installed)
# ─────────────────────────────────────────────────────────────────────────────
- name: Download WireGuard installer
  ansible.windows.win_get_url:
    url: "{{ wireguard_installer_url }}"
    dest: "{{ wireguard_installer_dest }}"
    force: false
  when: not wg_exe_stat.stat.exists

# ─────────────────────────────────────────────────────────────────────────────
# 3. Install WireGuard silently (/S = NSIS silent flag)
# ─────────────────────────────────────────────────────────────────────────────
- name: Install WireGuard silently
  ansible.windows.win_package:
    path: "{{ wireguard_installer_dest }}"
    arguments: /S
    state: present
  when: not wg_exe_stat.stat.exists
  notify: Pause for WireGuard service initialization

# ─────────────────────────────────────────────────────────────────────────────
# 4. Flush handlers so the post-install pause runs before config deployment
# ─────────────────────────────────────────────────────────────────────────────
- name: Flush handlers after installation
  ansible.builtin.meta: flush_handlers

# ─────────────────────────────────────────────────────────────────────────────
# 5. Ensure the WireGuard configurations directory exists
# ─────────────────────────────────────────────────────────────────────────────
- name: Ensure WireGuard configurations directory exists
  ansible.windows.win_file:
    path: "{{ wireguard_config_dir }}"
    state: directory

# ─────────────────────────────────────────────────────────────────────────────
# 6. Wait for WireGuardManager before touching the config directory
#    On a fresh install, WireGuardManager initializes in the background after
#    win_package completes and may clear Data\Configurations while starting up.
# ─────────────────────────────────────────────────────────────────────────────
- name: Wait for WireGuard manager service to be ready
  ansible.windows.win_service:
    name: WireGuardManager
  register: wg_manager_state
  until: wg_manager_state.state == 'running'
  retries: 10
  delay: 3
  when: not wg_exe_stat.stat.exists

- name: Wait for WireGuard manager to finish background initialization
  ansible.builtin.pause:
    seconds: 500
  when: not wg_exe_stat.stat.exists

# ─────────────────────────────────────────────────────────────────────────────
# 7. Deploy tunnel config (vault-encrypted file, auto-decrypted by Ansible)
# ─────────────────────────────────────────────────────────────────────────────
- name: Deploy WireGuard tunnel configuration
  ansible.windows.win_copy:
    src: wg0.conf
    dest: "{{ wireguard_config_dir }}\\{{ tunnel_name }}.conf"
    backup: true
  notify: Restart WireGuard tunnel service

# ─────────────────────────────────────────────────────────────────────────────
# 7b. Verify deployed config is a real WireGuard file (not raw vault ciphertext)
# ─────────────────────────────────────────────────────────────────────────────
- name: Verify deployed config is a valid WireGuard file
  ansible.windows.win_shell: "(Get-Content '{{ wireguard_config_dir }}\\{{ tunnel_name }}.conf' -TotalCount 1).Trim()"
  register: conf_first_line
  changed_when: false

- name: Assert config starts with [Interface]
  ansible.builtin.assert:
    that: conf_first_line.stdout | trim == '[Interface]'
    fail_msg: >
      Config file does not look like a valid WireGuard config.
      First line: '{{ conf_first_line.stdout }}'.
      The vault-encrypted source file may not have been decrypted before copy.

# ─────────────────────────────────────────────────────────────────────────────
# 8. Register the tunnel as a Windows service (if not already registered)
# ─────────────────────────────────────────────────────────────────────────────
- name: Check if WireGuard tunnel service is already registered
  ansible.windows.win_service:
    name: "WireGuardTunnel${{ tunnel_name }}"
  register: wg_service_info
  failed_when: false

- name: Register WireGuard tunnel as a Windows service
  ansible.windows.win_command: >
    "{{ wireguard_exe }}" /installtunnelservice
    "{{ wireguard_config_dir }}\\{{ tunnel_name }}.conf"
  when: >
    wg_service_info.exists is not defined
    or not wg_service_info.exists

- name: Wait for WireGuard tunnel service to appear after registration
  ansible.windows.win_service:
    name: "WireGuardTunnel${{ tunnel_name }}"
  register: tunnel_svc_poll
  until: tunnel_svc_poll.exists | default(false)
  retries: 10
  delay: 3
  failed_when: false
  when: >
    wg_service_info.exists is not defined
    or not wg_service_info.exists

# ─────────────────────────────────────────────────────────────────────────────
# 8. Ensure the tunnel service is running and set to auto-start
# ─────────────────────────────────────────────────────────────────────────────
- name: Ensure WireGuard tunnel service is running
  ansible.windows.win_service:
    name: "WireGuardTunnel${{ tunnel_name }}"
    state: started
    start_mode: auto
