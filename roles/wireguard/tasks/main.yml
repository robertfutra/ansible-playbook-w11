---
# ─────────────────────────────────────────────────────────────────────────────
# 1. Check if WireGuard is already installed
# ─────────────────────────────────────────────────────────────────────────────
- name: Check if WireGuard executable exists
  ansible.windows.win_stat:
    path: "{{ wireguard_exe }}"
  register: wg_exe_stat

# ─────────────────────────────────────────────────────────────────────────────
# 2. Download installer (only when WireGuard is not installed)
# ─────────────────────────────────────────────────────────────────────────────
- name: Download WireGuard installer
  ansible.windows.win_get_url:
    url: "{{ wireguard_installer_url }}"
    dest: "{{ wireguard_installer_dest }}"
    force: false
  when: not wg_exe_stat.stat.exists

# ─────────────────────────────────────────────────────────────────────────────
# 3. Install WireGuard silently (/S = NSIS silent flag)
# ─────────────────────────────────────────────────────────────────────────────
- name: Install WireGuard silently
  ansible.windows.win_package:
    path: "{{ wireguard_installer_dest }}"
    arguments: /S
    state: present
  when: not wg_exe_stat.stat.exists
  notify: Pause for WireGuard service initialization

# ─────────────────────────────────────────────────────────────────────────────
# 4. Flush handlers so the post-install pause runs before config deployment
# ─────────────────────────────────────────────────────────────────────────────
- name: Flush handlers after installation
  ansible.builtin.meta: flush_handlers

# ─────────────────────────────────────────────────────────────────────────────
# 5. Ensure the WireGuard configurations directory exists
# ─────────────────────────────────────────────────────────────────────────────
- name: Ensure WireGuard configurations directory exists
  ansible.windows.win_file:
    path: "{{ wireguard_config_dir }}"
    state: directory

# ─────────────────────────────────────────────────────────────────────────────
# 6. Check if the tunnel service is already registered
# ─────────────────────────────────────────────────────────────────────────────
- name: Check if WireGuard tunnel service is already registered
  ansible.windows.win_service:
    name: "WireGuardTunnel${{ tunnel_name }}"
  register: wg_service_info
  failed_when: false

# ─────────────────────────────────────────────────────────────────────────────
# 7a. FRESH INSTALL PATH (no tunnel service registered yet)
#
#     WireGuardManager runs a FileSystemWatcher on the Configurations directory.
#     If we write the .conf file there directly, the watcher detects it, tries
#     to auto-register the tunnel, fails (no existing service), and DELETES the
#     file — regardless of how long we wait before writing.
#
#     Fix: stage the config to C:\Windows\Temp\ (outside the watched directory),
#     then move it to Configurations and call /installtunnelservice in a single
#     PowerShell script so there is no gap for the watcher to fire.
# ─────────────────────────────────────────────────────────────────────────────
- name: Stage WireGuard config to temp (outside watched directory)
  ansible.windows.win_copy:
    src: wg0.conf
    dest: 'C:\Windows\Temp\{{ tunnel_name }}.conf'
    backup: false
  when: >
    wg_service_info.exists is not defined
    or not wg_service_info.exists

- name: Move config and register tunnel service atomically
  ansible.windows.win_shell: |
    $temp = 'C:\Windows\Temp\{{ tunnel_name }}.conf'
    $dest = '{{ wireguard_config_dir }}\{{ tunnel_name }}.conf'
    Copy-Item -Path $temp -Destination $dest -Force
    Remove-Item -Path $temp -Force -ErrorAction SilentlyContinue
    & '{{ wireguard_exe }}' /installtunnelservice $dest
  when: >
    wg_service_info.exists is not defined
    or not wg_service_info.exists

- name: Wait for WireGuard tunnel service to appear after registration
  ansible.windows.win_service:
    name: "WireGuardTunnel${{ tunnel_name }}"
  register: tunnel_svc_poll
  until: tunnel_svc_poll.exists | default(false)
  retries: 10
  delay: 3
  failed_when: not (tunnel_svc_poll.exists | default(false))
  when: >
    wg_service_info.exists is not defined
    or not wg_service_info.exists

# ─────────────────────────────────────────────────────────────────────────────
# 7b. UPDATE PATH (tunnel service already registered)
#
#     On re-runs the watcher recognises the existing service and does not delete
#     the file, so a plain win_copy to Configurations works fine.
# ─────────────────────────────────────────────────────────────────────────────
- name: Deploy WireGuard tunnel configuration (update)
  ansible.windows.win_copy:
    src: wg0.conf
    dest: "{{ wireguard_config_dir }}\\{{ tunnel_name }}.conf"
    backup: true
  notify: Restart WireGuard tunnel service
  when: >
    wg_service_info.exists is defined
    and wg_service_info.exists

# ─────────────────────────────────────────────────────────────────────────────
# 8. Verify the config file is in place and looks valid
# ─────────────────────────────────────────────────────────────────────────────
- name: Verify deployed config is a valid WireGuard file
  ansible.windows.win_shell: "(Get-Content '{{ wireguard_config_dir }}\\{{ tunnel_name }}.conf' -TotalCount 1).Trim()"
  register: conf_first_line
  changed_when: false

- name: Assert config starts with [Interface]
  ansible.builtin.assert:
    that: conf_first_line.stdout | trim == '[Interface]'
    fail_msg: "Config first line was: '{{ conf_first_line.stdout }}'"

# ─────────────────────────────────────────────────────────────────────────────
# 9. Ensure the tunnel service is running and set to auto-start
# ─────────────────────────────────────────────────────────────────────────────
- name: Ensure WireGuard tunnel service is running
  ansible.windows.win_service:
    name: "WireGuardTunnel${{ tunnel_name }}"
    state: started
    start_mode: auto
