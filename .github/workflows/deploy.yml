name: Deploy WireGuard Playbook

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:   # allows manual trigger from the GitHub Actions UI

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: self-hosted   # executes on the ansible-server runner (10.70.0.246)

    steps:
      - name: Clone or pull latest changes from GitHub
        run: |
          if [ -d ~/ansible-playbook-w11 ]; then
            cd ~/ansible-playbook-w11 && git pull origin main
          else
            git clone https://github.com/robertfutra/ansible-playbook-w11.git ~/ansible-playbook-w11
          fi

      - name: Write vault password to temp file
        run: echo "${{ secrets.VAULT_PASSWORD }}" > ~/ansible-playbook-w11/.vault_pass

      - name: Run Ansible playbook
        run: |
          cd ~/ansible-playbook-w11
          ansible-playbook site.yml --vault-password-file .vault_pass

      - name: Remove vault password file
        if: always()   # runs even if the playbook step fails
        run: rm -f ~/ansible-playbook-w11/.vault_pass
